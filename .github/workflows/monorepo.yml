detect-changes:
  runs-on: ubuntu-latest
  outputs:
    matrix: ${{ steps.set-matrix.outputs.matrix }}      #⬅️ output available to other jobs
    has_changes: ${{ steps.set-matrix.outputs.has_changes }}
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2                                    #⬅️ history is needed for the diff

    - name: Detect changed services
      id: set-matrix
      run: |
        CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^services/' | cut -d'/' -f2 | sort -u)
        if [ -z "$CHANGED" ]; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
        else
          JSON=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "matrix={\"service\":$JSON}" >> $GITHUB_OUTPUT    #⬅️ format required by fromJson
        fi