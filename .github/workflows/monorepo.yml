name: Monorepo CI

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: set-matrix
        run: |
          # TODO: Use git diff to detect changed directories under services/
          # TODO: Convert the directory list into JSON
          # TODO: Set outputs: matrix and has_changes
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT

